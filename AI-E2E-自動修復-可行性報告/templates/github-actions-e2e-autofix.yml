name: e2e-autofix

on:
  workflow_dispatch:
  pull_request:

jobs:
  e2e-autofix:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安裝相依套件
        run: npm ci

      - name: 安裝 Playwright 瀏覽器
        run: npx playwright install --with-deps

      - name: 啟動應用
        run: |
          npm run dev > app.log 2>&1 &
          echo $! > app.pid

      - name: 等待健康檢查
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "應用未在預期時間內就緒"
          exit 1

      - name: 執行自動修復迴圈
        env:
          AI_TOOL: qwen
          MAX_ROUNDS: 3
        run: bash AI-E2E-自動修復-可行性報告/templates/run-autofix-loop.sh

      - name: 上傳工件
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-autofix-artifacts
          path: |
            artifacts/autofix
            playwright-report
            test-results
            app.log

      - name: 停止應用
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi
