name: e2e-autofix

on:
  workflow_dispatch:
  pull_request:

jobs:
  e2e-autofix:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start app
        run: |
          npm run dev > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for app
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become healthy in time"
          exit 1

      - name: Run autonomous repair loop
        env:
          AI_TOOL: qwen
          MAX_ROUNDS: 3
        run: bash AI-E2E-自動修復-可行性報告/templates/run-autofix-loop.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-autofix-artifacts
          path: |
            artifacts/autofix
            playwright-report
            test-results
            app.log

      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi
