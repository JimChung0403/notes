<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jim Noted Index</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1115;
        --surface: #181c23;
        --border: rgba(127, 127, 127, 0.2);
        --fg: #f5f7fa;
        --muted: #a9b4c0;
        --accent: #ffb347;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f8fb;
          --surface: #ffffff;
          --border: rgba(31, 41, 55, 0.12);
          --fg: #1f2937;
          --muted: #5b6574;
          --accent: #c46b00;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background: radial-gradient(circle at top, rgba(255, 179, 71, 0.12), transparent 35%),
          var(--bg);
        color: var(--fg);
      }

      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 48px 20px 80px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 2.8rem);
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        line-height: 1.7;
      }

      .table-wrap {
        overflow-x: auto;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 16px 18px;
        text-align: left;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }

      th {
        font-size: 0.84rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
      }

      tr:last-child td {
        border-bottom: none;
      }

      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }

      a:hover {
        text-decoration: underline;
      }

      code {
        background: rgba(127, 127, 127, 0.12);
        padding: 2px 8px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Jim Noted</h1>
      <p>這個頁面是 Firebase Hosting 的索引頁。下面列出目前已公開的 HTML 檔案。</p>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>檔名</th>
              <th>用途</th>
              <th>路徑</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><a href="./ai-dev-workflow-playbook.html">ai-dev-workflow-playbook.html</a></td>
              <td>AI 開發工作流 Playbook，作為目前主要公開頁面。</td>
              <td><code>/ai-dev-workflow-playbook.html</code></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </body>
</html>
